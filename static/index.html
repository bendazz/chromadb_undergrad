<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Documents</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Documents</h1>

    <form id="search-form">

    <script src="script.js"></script>
</body>
</html>
